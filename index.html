<!DOCTYPE html>
<html lang="zh-CN" data-theme="moon">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aetheria — Just For U</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="style/base.css" />
  <link rel="stylesheet" href="style/themes/moon.css" />
  <link rel="stylesheet" href="style/themes/sakura.css" />
  <link rel="stylesheet" href="style/themes/forest.css" />
  <link rel="stylesheet" href="style/themes/void.css" />
  <link rel="stylesheet" href="style/components.css" />
</head>
<body data-theme="moon">

  <!-- == BLOCK: background-layer == -->
  <div class="bg-layer" id="bgLayer">
    <canvas class="mesh-canvas" id="meshCanvas"></canvas>
    <div class="bg-image-overlay" id="bgImageOverlay"></div>
  </div>
  <!-- == END: background-layer == -->

  <!-- == BLOCK: app-shell == -->
  <div class="app-shell">

    <!-- Header -->
    <header class="app-header glass-card">
      <div class="header-logo">
        <span class="logo-just">JUST FOR U</span>
        <span class="logo-name">Aetheria</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="themeToggleBtn" title="切换主题" aria-label="切换主题">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </header>

    <!-- Main content area -->
    <main class="app-main" id="appMain">

      <!-- == BLOCK: section-home == -->
      <section class="page-section active" id="section-home" data-page="home">
        <div class="section-inner">
          <div class="greeting-block">
            <p class="greeting-sub" id="greetingTime">晚上好</p>
            <h1 class="greeting-main" id="greetingText">今天，你还好吗？</h1>
          </div>

          <!-- Daily card -->
          <div class="glass-card daily-card-block">
            <div class="block-header">
              <span class="block-icon">🔮</span>
              <span class="block-title">今日塔罗</span>
              <button class="text-btn" id="repullBtn">重抽一次</button>
            </div>
            <div class="daily-card-display" id="dailyCardDisplay">
              <div class="tarot-card-mini" id="dailyCardInner">
                <div class="tarot-card-front">
                  <span class="card-emoji" id="dailyCardEmoji">✨</span>
                  <span class="card-name" id="dailyCardName">点击抽取</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Quick mood -->
          <div class="glass-card mood-quick-block">
            <div class="block-header">
              <span class="block-icon">💫</span>
              <span class="block-title">此刻心情</span>
            </div>
            <div class="mood-slider-wrap">
              <span class="mood-label-left">😔</span>
              <input type="range" min="1" max="10" value="5" class="mood-slider" id="quickMoodSlider" />
              <span class="mood-label-right">🌟</span>
            </div>
            <div class="mood-score-display">
              <span id="moodScoreDisplay">5</span>
              <span class="mood-score-unit">/ 10</span>
            </div>
            <button class="glass-btn primary-btn" id="saveMoodBtn">记录心情</button>
          </div>
        </div>
      </section>
      <!-- == END: section-home == -->

      <!-- == BLOCK: section-divination == -->
      <section class="page-section" id="section-divination" data-page="divination">
        <div class="section-inner">
          <div class="section-header">
            <h2 class="section-title">占卜</h2>
            <p class="section-sub">倾听牌面的低语</p>
          </div>
          <div class="tab-bar glass-card">
            <button class="tab-btn active" data-tab="tarot">塔罗牌</button>
            <button class="tab-btn" data-tab="lenormand">诺曼底牌</button>
          </div>
          <div class="tab-content" id="tabTarot">
            <div class="spread-selector glass-card">
              <button class="spread-btn active" data-spread="1">单张</button>
              <button class="spread-btn" data-spread="3">三张</button>
              <button class="spread-btn" data-spread="celtic">凯尔特十字</button>
            </div>
            <div class="cards-stage" id="cardsStage">
              <p class="stage-hint">选择牌阵，开始占卜</p>
            </div>
            <button class="glass-btn primary-btn full-btn" id="drawCardsBtn">🔮 抽牌</button>
            <div class="ai-reading-block glass-card" id="aiReadingBlock" style="display:none">
              <button class="glass-btn accent-btn full-btn" id="aiReadBtn">✨ AI 解读</button>
              <div class="ai-reading-text" id="aiReadingText"></div>
            </div>
          </div>
          <div class="tab-content hidden" id="tabLenormand">
            <div class="cards-stage" id="lenormandStage">
              <p class="stage-hint">诺曼底牌占卜即将开放</p>
            </div>
            <button class="glass-btn primary-btn full-btn" id="drawLenormandBtn">🃏 抽牌</button>
          </div>
        </div>
      </section>
      <!-- == END: section-divination == -->

      <!-- == BLOCK: section-wheel == -->
      <section class="page-section" id="section-wheel" data-page="wheel">
        <div class="section-inner">
          <div class="section-header">
            <h2 class="section-title">决策转盘</h2>
            <p class="section-sub">交给命运来决定</p>
          </div>
          <div class="wheel-options-block glass-card">
            <div class="block-header">
              <span class="block-title">选项</span>
              <button class="icon-btn" id="addOptionBtn" title="添加选项">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
              </button>
            </div>
            <div class="options-list" id="optionsList"></div>
            <input type="text" class="glass-input" id="optionInput" placeholder="输入选项，回车添加" maxlength="20" />
          </div>
          <div class="wheel-stage">
            <canvas class="wheel-canvas" id="wheelCanvas" width="320" height="320"></canvas>
          </div>
          <button class="glass-btn primary-btn full-btn" id="spinBtn">🎡 旋转</button>
          <div class="wheel-result glass-card" id="wheelResult" style="display:none">
            <span class="result-label">命运选择了</span>
            <span class="result-value" id="wheelResultText"></span>
          </div>
        </div>
      </section>
      <!-- == END: section-wheel == -->

      <!-- == BLOCK: section-destroy == -->
      <section class="page-section" id="section-destroy" data-page="destroy">
        <div class="section-inner">
          <div class="section-header">
            <h2 class="section-title">负能量销毁室</h2>
            <p class="section-sub">写下来，然后让它消失</p>
          </div>
          <div class="glass-card destroy-input-block">
            <textarea class="glass-textarea" id="destroyText" placeholder="把你想销毁的一切写在这里..." rows="5"></textarea>
          </div>
          <div class="destroy-modes glass-card">
            <p class="modes-label">选择销毁方式</p>
            <div class="modes-grid">
              <button class="mode-btn active" data-mode="burn">🔥<span>燃烧</span></button>
              <button class="mode-btn" data-mode="drown">💧<span>淹没</span></button>
              <button class="mode-btn" data-mode="dissolve">💨<span>消散</span></button>
              <button class="mode-btn" data-mode="void">🌀<span>虚空</span></button>
            </div>
          </div>
          <button class="glass-btn danger-btn full-btn" id="destroyBtn">销毁它</button>
        </div>
        <!-- Full-screen destroy animation overlay -->
        <div class="destroy-overlay" id="destroyOverlay" style="display:none">
          <canvas class="destroy-canvas" id="destroyCanvas"></canvas>
        </div>
      </section>
      <!-- == END: section-destroy == -->

      <!-- == BLOCK: section-daily == -->
      <section class="page-section" id="section-daily" data-page="daily">
        <div class="section-inner">
          <div class="section-header">
            <h2 class="section-title">日常中心</h2>
            <p class="section-sub" id="dailyDateDisplay"></p>
          </div>

          <!-- Mood block -->
          <div class="glass-card mood-full-block">
            <div class="block-header">
              <span class="block-icon">💫</span>
              <span class="block-title">今日心情</span>
              <button class="text-btn silent-btn" id="silentDayBtn">静默日</button>
            </div>
            <div class="mood-slider-wrap">
              <span class="mood-label-left">😔</span>
              <input type="range" min="1" max="10" value="5" class="mood-slider" id="dailyMoodSlider" />
              <span class="mood-label-right">🌟</span>
            </div>
            <div class="mood-tags" id="moodTags">
              <button class="tag-btn" data-tag="平静">平静</button>
              <button class="tag-btn" data-tag="开心">开心</button>
              <button class="tag-btn" data-tag="焦虑">焦虑</button>
              <button class="tag-btn" data-tag="疲惫">疲惫</button>
              <button class="tag-btn" data-tag="感恩">感恩</button>
              <button class="tag-btn" data-tag="迷茫">迷茫</button>
              <button class="tag-btn" data-tag="充实">充实</button>
              <button class="tag-btn" data-tag="低落">低落</button>
            </div>
            <textarea class="glass-textarea small" id="moodNote" placeholder="今天想说点什么..." rows="2"></textarea>
            <button class="glass-btn primary-btn" id="saveDailyMoodBtn">保存</button>
          </div>

          <!-- Mood chart -->
          <div class="glass-card chart-block">
            <div class="block-header">
              <span class="block-icon">📈</span>
              <span class="block-title">近7天心情</span>
            </div>
            <canvas class="mood-chart" id="moodChart" height="80"></canvas>
          </div>

          <!-- Tasks -->
          <div class="glass-card tasks-block">
            <div class="block-header">
              <span class="block-icon">✅</span>
              <span class="block-title">任务</span>
              <button class="icon-btn" id="addTaskBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
              </button>
            </div>
            <div class="task-input-row" id="taskInputRow" style="display:none">
              <input type="text" class="glass-input" id="taskInput" placeholder="新任务..." maxlength="50" />
              <select class="glass-select" id="taskPriority">
                <option value="low">低</option>
                <option value="mid" selected>中</option>
                <option value="high">高</option>
              </select>
              <button class="glass-btn small-btn" id="confirmTaskBtn">添加</button>
            </div>
            <ul class="task-list" id="taskList"></ul>
          </div>

          <!-- Habits -->
          <div class="glass-card habits-block">
            <div class="block-header">
              <span class="block-icon">🌱</span>
              <span class="block-title">习惯打卡</span>
              <button class="icon-btn" id="addHabitBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
              </button>
            </div>
            <div class="habits-list" id="habitsList"></div>
          </div>
        </div>
      </section>
      <!-- == END: section-daily == -->

      <!-- == BLOCK: section-settings == -->
      <section class="page-section" id="section-settings" data-page="settings">
        <div class="section-inner">
          <div class="section-header">
            <h2 class="section-title">设置</h2>
          </div>

          <!-- Background -->
          <div class="glass-card settings-block">
            <div class="block-header"><span class="block-icon">🖼️</span><span class="block-title">背景</span></div>
            <div class="settings-row">
              <label class="settings-label">图片 URL</label>
              <input type="text" class="glass-input" id="bgUrlInput" placeholder="https://..." />
              <button class="glass-btn small-btn" id="setBgUrlBtn">应用</button>
            </div>
            <div class="settings-row">
              <label class="settings-label">上传图片</label>
              <label class="upload-label glass-btn small-btn">
                选择文件
                <input type="file" id="bgFileInput" accept="image/*" style="display:none" />
              </label>
            </div>
            <button class="glass-btn ghost-btn small-btn" id="clearBgBtn">清除背景</button>
          </div>

          <!-- Theme -->
          <div class="glass-card settings-block">
            <div class="block-header"><span class="block-icon">🎨</span><span class="block-title">主题</span></div>
            <div class="theme-grid">
              <button class="theme-swatch active" data-theme="moon"><span class="swatch-dot moon-dot"></span>Moon</button>
              <button class="theme-swatch" data-theme="sakura"><span class="swatch-dot sakura-dot"></span>Sakura</button>
              <button class="theme-swatch" data-theme="forest"><span class="swatch-dot forest-dot"></span>Forest</button>
              <button class="theme-swatch" data-theme="void"><span class="swatch-dot void-dot"></span>Void</button>
            </div>
          </div>

          <!-- AI -->
          <div class="glass-card settings-block">
            <div class="block-header"><span class="block-icon">🤖</span><span class="block-title">AI 配置</span></div>
            <div class="settings-row">
              <label class="settings-label">Base URL</label>
              <input type="text" class="glass-input" id="aiBaseUrl" placeholder="https://api.deepseek.com" />
            </div>
            <div class="settings-row">
              <label class="settings-label">API Key</label>
              <input type="password" class="glass-input" id="aiApiKey" placeholder="sk-..." />
            </div>
            <div class="settings-row">
              <label class="settings-label">Model</label>
              <input type="text" class="glass-input" id="aiModel" placeholder="deepseek-chat" />
            </div>
            <button class="glass-btn primary-btn" id="saveAiBtn">保存配置</button>
          </div>

          <!-- Data -->
          <div class="glass-card settings-block">
            <div class="block-header"><span class="block-icon">💾</span><span class="block-title">数据</span></div>
            <div class="settings-row gap">
              <button class="glass-btn ghost-btn" id="exportDataBtn">导出 JSON</button>
              <button class="glass-btn danger-btn" id="clearDataBtn">清除所有数据</button>
            </div>
          </div>

          <div class="settings-footer">
            <p>JUST FOR U · Aetheria</p>
            <p>Made with 🖤 by shadow</p>
          </div>
        </div>
      </section>
      <!-- == END: section-settings == -->

    </main>

    <!-- == BLOCK: bottom-nav == -->
    <nav class="bottom-nav glass-card" id="bottomNav">
      <button class="nav-btn active" data-page="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">主页</span>
      </button>
      <button class="nav-btn" data-page="divination">
        <span class="nav-icon">🔮</span>
        <span class="nav-label">占卜</span>
      </button>
      <button class="nav-btn" data-page="wheel">
        <span class="nav-icon">🎡</span>
        <span class="nav-label">转盘</span>
      </button>
      <button class="nav-btn" data-page="destroy">
        <span class="nav-icon">💥</span>
        <span class="nav-label">销毁</span>
      </button>
      <button class="nav-btn" data-page="daily">
        <span class="nav-icon">📅</span>
        <span class="nav-label">日常</span>
      </button>
      <button class="nav-btn" data-page="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">设置</span>
      </button>
    </nav>
    <!-- == END: bottom-nav == -->

  </div>
  <!-- == END: app-shell == -->

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/tarot.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/destroy.js"></script>
  <script src="js/daily.js"></script>
</body>
</html>
