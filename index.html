<!DOCTYPE html>
<html lang="zh-CN" data-theme="moon">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Just For U — 专属于你的情感空间" />
  <title>Just For U</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Screen&family=Noto+Serif+SC:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="style/base.css" />
  <link rel="stylesheet" href="style/components.css" />
  <link rel="stylesheet" href="style/themes/moon.css" />
  <link rel="stylesheet" href="style/themes/sakura.css" />
  <link rel="stylesheet" href="style/themes/forest.css" />
  <link rel="stylesheet" href="style/themes/void.css" />
</head>
<body>

  <!-- == BLOCK: background == -->
  <div class="bg-mesh" aria-hidden="true">
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
  </div>
  <div class="bg-custom" id="bgCustom" aria-hidden="true"></div>
  <!-- == END: background == -->

  <!-- == BLOCK: app-wrapper == -->
  <div class="app-wrapper">

    <!-- == BLOCK: sidebar == -->
    <nav class="nav-sidebar" role="navigation" aria-label="主导航">
      <div class="nav-logo">✦ Just For U</div>

      <button class="nav-item active" data-section="home" aria-label="首页">
        <span class="nav-icon" aria-hidden="true">🏠</span>
        <span>首页</span>
      </button>
      <button class="nav-item" data-section="divination" aria-label="占卜">
        <span class="nav-icon" aria-hidden="true">🔮</span>
        <span>占卜</span>
      </button>
      <button class="nav-item" data-section="wheel" aria-label="决策转盘">
        <span class="nav-icon" aria-hidden="true">🎡</span>
        <span>转盘</span>
      </button>
      <button class="nav-item" data-section="destroy" aria-label="负能量销毁室">
        <span class="nav-icon" aria-hidden="true">💥</span>
        <span>销毁</span>
      </button>
      <button class="nav-item" data-section="daily" aria-label="每日中心">
        <span class="nav-icon" aria-hidden="true">📅</span>
        <span>每日</span>
      </button>

      <div class="nav-spacer"></div>

      <button class="nav-item" data-section="settings" aria-label="设置">
        <span class="nav-icon" aria-hidden="true">⚙️</span>
        <span>设置</span>
      </button>
    </nav>
    <!-- == END: sidebar == -->

    <!-- == BLOCK: main-content == -->
    <main class="main-content" id="mainContent">

      <!-- == BLOCK: section-home == -->
      <section class="section-panel active" id="section-home" aria-label="首页">
        <div id="home-root"></div>
      </section>
      <!-- == END: section-home == -->

      <!-- == BLOCK: section-divination == -->
      <section class="section-panel" id="section-divination" aria-label="占卜">
        <div id="divination-root"></div>
      </section>
      <!-- == END: section-divination == -->

      <!-- == BLOCK: section-wheel == -->
      <section class="section-panel" id="section-wheel" aria-label="决策转盘">
        <div id="wheel-root"></div>
      </section>
      <!-- == END: section-wheel == -->

      <!-- == BLOCK: section-destroy == -->
      <section class="section-panel" id="section-destroy" aria-label="负能量销毁室">
        <div id="destroy-root"></div>
      </section>
      <!-- == END: section-destroy == -->

      <!-- == BLOCK: section-daily == -->
      <section class="section-panel" id="section-daily" aria-label="每日中心">
        <div id="daily-root"></div>
      </section>
      <!-- == END: section-daily == -->

      <!-- == BLOCK: section-settings == -->
      <section class="section-panel" id="section-settings" aria-label="设置">
        <div id="settings-root"></div>
      </section>
      <!-- == END: section-settings == -->

    </main>
    <!-- == END: main-content == -->

    <!-- == BLOCK: nav-bottom == -->
    <nav class="nav-bottom" role="navigation" aria-label="底部导航">
      <button class="nav-item active" data-section="home" aria-label="首页">
        <span class="nav-icon" aria-hidden="true">🏠</span>
        <span>首页</span>
      </button>
      <button class="nav-item" data-section="divination" aria-label="占卜">
        <span class="nav-icon" aria-hidden="true">🔮</span>
        <span>占卜</span>
      </button>
      <button class="nav-item" data-section="wheel" aria-label="转盘">
        <span class="nav-icon" aria-hidden="true">🎡</span>
        <span>转盘</span>
      </button>
      <button class="nav-item" data-section="destroy" aria-label="销毁">
        <span class="nav-icon" aria-hidden="true">💥</span>
        <span>销毁</span>
      </button>
      <button class="nav-item" data-section="daily" aria-label="每日">
        <span class="nav-icon" aria-hidden="true">📅</span>
        <span>每日</span>
      </button>
      <button class="nav-item" data-section="settings" aria-label="设置">
        <span class="nav-icon" aria-hidden="true">⚙️</span>
        <span>设置</span>
      </button>
    </nav>
    <!-- == END: nav-bottom == -->

  </div>
  <!-- == END: app-wrapper == -->

  <!-- == BLOCK: toast-container == -->
  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>
  <!-- == END: toast-container == -->

  <!-- == BLOCK: scripts == -->
  <script src="js/api.js"></script>
  <script src="js/tarot.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/destroy.js"></script>
  <script src="js/daily.js"></script>
  <script src="js/app.js"></script>
  <!-- == END: scripts == -->

</body>
</html>
