<!DOCTYPE html>
<html lang="zh-CN" data-theme="moon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUST FOR U · Aetheria</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style/base.css">
    <link rel="stylesheet" href="style/components.css">
    <link rel="stylesheet" href="style/themes/moon.css">
    <link rel="stylesheet" href="style/themes/sakura.css">
    <link rel="stylesheet" href="style/themes/forest.css">
    <link rel="stylesheet" href="style/themes/void.css">
</head>
<body>

    <!-- == BLOCK: background-system == -->
    <div class="bg-layer" id="bgLayer">
        <div class="bg-custom" id="bgCustom"></div><div class="bg-mesh">
            <div class="bg-orb orb-1"></div>
            <div class="bg-orb orb-2"></div>
            <div class="bg-orb orb-3"></div>
            <div class="bg-orb orb-4"></div>
        </div>
    </div>
    <!-- == END: background-system == -->

    <!-- == BLOCK: app-shell == -->
    <div class="app-shell">

        <!-- ====== HOME ====== -->
        <section class="page page--active" id="page-home">
            <div class="page-scroll">
                <div class="home-hero">
                    <p class="home-subtitle mono" data-i18n="home_subtitle">JUST FOR U · Aetheria</p>
                    <h1 class="home-greeting" id="homeGreeting"></h1>
                    <div class="home-time-block glass-card glass-card--flat">
                        <div class="home-date" id="homeDate"></div>
                        <div class="home-clock" id="homeClock"></div>
                    </div><div class="home-quote glass-card glass-card--flat" id="homeQuote">
                        <span class="quote-icon">✦</span>
                        <p class="quote-text" id="quoteText"></p>
                    </div>
                </div>

                <div class="home-cards">
                    <div class="glass-card home-card" id="homeTarotCard">
                        <div class="card-header mono">
                            <span data-i18n="home_daily_card">今日一卡</span>
                            <span>🔮</span>
                        </div>
                        <div class="home-tarot-placeholder">
                            <div class="tarot-emoji">🌙</div>
                            <p data-i18n="home_tarot_hint">点击前往占卜抽取今日卡牌</p>
                        </div>
                    </div>

                    <div class="glass-card home-card" id="homeMoodCard">
                        <div class="card-header mono">
                            <span data-i18n="home_mood">心情速记</span>
                            <span>💫</span>
                        </div>
                        <div class="mood-quick">
                            <input type="range" min="1" max="10" value="5" class="mood-slider" id="homeMoodSlider">
                            <div class="mood-labels">
                                <span>😢</span>
                                <span class="mood-value" id="homeMoodValue">5</span>
                                <span>😊</span>
                            </div>
                            <button class="btn btn--ghost btn--sm" id="homeMoodSave" data-i18n="home_mood_save">记录</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ====== DIVINATION ====== -->
        <section class="page" id="page-divination">
            <div class="page-scroll">
                <div class="page-header">
                    <h2 class="page-title" data-i18n="nav_divination">占卜</h2>
                    <p class="page-desc" data-i18n="div_desc">选择你的牌阵，聆听宇宙的低语</p>
                </div>
                <div class="placeholder-content glass-card">
                    <div class="placeholder-icon">🔮</div>
                    <p data-i18n="coming_soon">即将开放</p>
                </div></div>
        </section>

        <!-- ====== WHEEL ====== -->
        <section class="page" id="page-wheel">
            <div class="page-scroll">
                <div class="page-header">
                    <h2 class="page-title" data-i18n="nav_wheel">转盘</h2>
                    <p class="page-desc" data-i18n="wheel_desc">把选择交给命运</p>
                </div>
                <div class="placeholder-content glass-card">
                    <div class="placeholder-icon">🎡</div>
                    <p data-i18n="coming_soon">即将开放</p>
                </div>
            </div>
        </section>

        <!-- ====== DESTROY ====== -->
        <!-- == BLOCK: page-destroy == -->
<section id="page-destroy" class="page">
  <div class="page-scroll">

    <div class="page-header">
      <h2data-i18n="destroy_title">负能量销毁室</h2>
      <p data-i18n="destroy_desc">写下困扰你的一切，然后看着它们灰飞烟灭。</p>
    </div>

    <!--输入区-->
    <div class="glass-card destroy-input-card">
      <textarea
        id="destroyInput"
        class="destroy-textarea"
        data-i18n-placeholder="destroy_placeholder"
        placeholder="把你的负能量写在这里..."
        maxlength="500"
      ></textarea>
      <div class="destroy-char-count">
        <span id="destroyCharCount">0</span> / 500
      </div></div>

    <!-- 模式选择 -->
    <div class="glass-card destroy-mode-card">
      <p class="destroy-mode-label" data-i18n="destroy_mode_label">选择销毁方式</p>
      <div class="destroy-modes">
        <button class="destroy-mode-btn active" data-mode="fire" aria-label="Fire">
          <span class="destroy-mode-icon">🔥</span>
          <span class="destroy-mode-name" data-i18n="destroy_mode_fire">焚烧</span>
        </button>
        <button class="destroy-mode-btn" data-mode="water" aria-label="Water">
          <span class="destroy-mode-icon">💧</span>
          <span class="destroy-mode-name" data-i18n="destroy_mode_water">溶解</span>
        </button>
        <button class="destroy-mode-btn" data-mode="wind" aria-label="Wind">
          <span class="destroy-mode-icon">💨</span>
          <span class="destroy-mode-name" data-i18n="destroy_mode_wind">风化</span>
        </button>
        <button class="destroy-mode-btn" data-mode="void" aria-label="Void">
          <span class="destroy-mode-icon">🌀</span>
          <span class="destroy-mode-name" data-i18n="destroy_mode_void">黑洞</span>
        </button>
      </div>
    </div>

    <!-- 销毁按钮 -->
    <button id="destroyBtn" class="btn-primary destroy-btn" data-i18n="destroy_btn" disabled>
      销毁它
    </button>

    <!-- Canvas 动画层 -->
    <div id="destroyCanvasWrap" class="destroy-canvas-wrap" style="display:none;">
      <canvas id="destroyCanvas"></canvas>
    </div>

    <!-- 销毁完成 — 治愈语 -->
    <div id="destroyResult" class="glass-card destroy-result" style="display:none;">
      <div class="destroy-result-icon">✨</div>
      <p id="destroyResultText" class="destroy-result-text"></p>
      <button id="destroyAgainBtn" class="btn-secondary" data-i18n="destroy_again">再来一次</button>
    </div>

  </div>
</section>
<!-- == END: page-destroy == -->

        <!-- ====== DAILY====== -->
        <section class="page" id="page-daily">
            <div class="page-scroll">
                <div class="page-header">
                    <h2 class="page-title" data-i18n="nav_daily">日常</h2>
                    <p class="page-desc" data-i18n="daily_desc">记录你的每一天</p>
                </div>
                <div class="placeholder-content glass-card">
                    <div class="placeholder-icon">📅</div>
                    <p data-i18n="coming_soon">即将开放</p>
                </div>
            </div>
        </section>

        <!-- ====== SETTINGS ====== -->
        <section class="page" id="page-settings">
            <div class="page-scroll">
                <div class="page-header">
                    <h2 class="page-title" data-i18n="nav_settings">设置</h2>
                </div>

                <!-- Theme -->
                <div class="glass-card settings-group">
                    <h3 class="settings-label" data-i18n="set_theme">主题</h3>
                    <div class="theme-picker" id="themePicker">
                        <button class="theme-btn theme-btn--moon active" data-theme="moon" title="Moon">
                            <span class="theme-dot"></span><span>Moon</span>
                        </button>
                        <button class="theme-btn theme-btn--sakura" data-theme="sakura" title="Sakura">
                            <span class="theme-dot"></span><span>Sakura</span>
                        </button>
                        <button class="theme-btn theme-btn--forest" data-theme="forest" title="Forest">
                            <span class="theme-dot"></span><span>Forest</span>
                        </button>
                        <button class="theme-btn theme-btn--void" data-theme="void" title="Void">
                            <span class="theme-dot"></span><span>Void</span>
                        </button>
                    </div>
                </div>

                <!-- Background -->
                <div class="glass-card settings-group">
                    <h3 class="settings-label" data-i18n="set_bg">背景</h3>
                    <div class="settings-row">
                        <label class="btn btn--ghost btn--sm btn--upload">
                            <span data-i18n="set_bg_upload">上传图片</span>
                            <input type="file" accept="image/*" id="bgUpload" hidden>
                        </label>
                        <span class="settings-or" data-i18n="set_or">或</span>
                        <input type="text" class="input" id="bgUrlInput" placeholder="粘贴图片 URL" data-i18n-placeholder="set_bg_url_ph">
                        <button class="btn btn--ghost btn--sm" id="bgUrlApply" data-i18n="set_bg_apply">应用</button>
                    </div>
                    <button class="btn btn--ghost btn--sm" id="bgReset" data-i18n="set_bg_reset">恢复默认背景</button>
                </div>

                <!-- Language -->
                <div class="glass-card settings-group">
                    <h3 class="settings-label" data-i18n="set_lang">语言</h3>
                    <div class="lang-picker" id="langPicker">
                        <button class="btn btn--ghost btn--sm active" data-lang="zh">中文</button>
                        <button class="btn btn--ghost btn--sm" data-lang="en">English</button>
                </div>
                </div>

                <!-- AI Provider -->
                <div class="glass-card settings-group">
                    <h3 class="settings-label" data-i18n="set_ai">AI 服务</h3>
                    <div class="settings-col">
                        <input type="text" class="input" id="aiBaseUrl" placeholder="Base URL (e.g. https://api.deepseek.com)" value="https://api.deepseek.com">
                        <input type="password" class="input" id="aiApiKey" placeholder="API Key" data-i18n-placeholder="set_ai_key_ph">
                        <input type="text" class="input" id="aiModel" placeholder="Model (e.g. deepseek-chat)" value="deepseek-chat">
                        <button class="btn btn--ghost btn--sm" id="aiSave" data-i18n="set_ai_save">保存AI 配置</button>
                    </div>
                </div>

                <!-- Data -->
                <div class="glass-card settings-group">
                    <h3 class="settings-label" data-i18n="set_data">数据</h3>
                    <div class="settings-row">
                        <button class="btn btn--ghost btn--sm" id="dataExport" data-i18n="set_data_export">导出JSON</button>
                        <button class="btn btn--ghost btn--sm btn--danger" id="dataClear" data-i18n="set_data_clear">清除所有数据</button>
                    </div>
                </div>

                <div class="settings-footer mono">
                    <p>JUST FOR U · Aetheria</p>
                    <p>by shadow · v0.1.0</p>
                </div>
            </div>
        </section>

    </div>
    <!-- == END: app-shell == -->

    <!-- == BLOCK: bottom-nav == -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="home" aria-label="Home">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span data-i18n="nav_home">首页</span>
        </button>
        <button class="nav-item" data-page="divination" aria-label="Divination">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span data-i18n="nav_divination">占卜</span>
        </button>
        <button class="nav-item" data-page="wheel" aria-label="Wheel">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
            <span data-i18n="nav_wheel">转盘</span>
        </button>
        <button class="nav-item" data-page="destroy" aria-label="Destroy">
            <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 810-12h-9l1-8z"/></svg>
            <span data-i18n="nav_destroy">销毁</span>
        </button>
        <button class="nav-item" data-page="daily" aria-label="Daily">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span data-i18n="nav_daily">日常</span>
        </button>
        <button class="nav-item" data-page="settings" aria-label="Settings">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.511H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span data-i18n="nav_settings">设置</span>
        </button>
    </nav>
    <!-- == END: bottom-nav == -->

    <!-- == BLOCK: toast == -->
    <div class="toast" id="toast"></div>
    <!-- == END: toast == -->

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/destroy.js"></script>
</body>
</html>
